name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: TypeScript type check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Next.js build (DEMO mode)
        run: npm run build
        env:
          NEXT_PUBLIC_DEMO_MODE: "1"
          NEXT_PUBLIC_GAS_ENDPOINT: "https://example.com/exec"
          NEXT_PUBLIC_LIFF_ID: "0000000000-aaaaaaaa"
